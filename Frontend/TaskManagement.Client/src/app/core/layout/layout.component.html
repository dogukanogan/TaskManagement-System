<div class="flex h-screen overflow-hidden bg-slate-50 dark:bg-slate-950 font-[Inter,system-ui,sans-serif] transition-colors duration-300">
  
  <!-- Sidebar -->
  <aside class="flex flex-col h-full bg-white dark:bg-slate-950 border-r border-slate-100 dark:border-slate-800 transition-all duration-300 flex-shrink-0"
         [ngClass]="isSidebarCollapsed ? 'w-16' : 'w-60'">
    <!-- Logo -->
    <div class="flex items-center gap-2.5 h-16 border-b border-slate-100 dark:border-slate-800 flex-shrink-0" [ngClass]="isSidebarCollapsed ? 'justify-center px-0' : 'px-5'">
      <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-md shadow-blue-200/60 flex-shrink-0">
        <lucide-icon name="check-square" [size]="15" class="text-white"></lucide-icon>
      </div>
      <span *ngIf="!isSidebarCollapsed" class="text-lg font-bold text-slate-900 dark:text-slate-100 tracking-tight">TaskFlow</span>
    </div>

    <!-- Nav -->
    <nav class="flex-1 p-2 flex flex-col gap-0.5 overflow-y-auto">
      <a *ngFor="let item of navItems" 
         [routerLink]="item.path" 
         routerLinkActive="bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400" 
         #rla="routerLinkActive"
         [title]="isSidebarCollapsed ? item.label : ''"
         class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition-all duration-150 group relative w-full"
         [ngClass]="[
           isSidebarCollapsed ? 'justify-center px-0' : '',
           !rla.isActive ? 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-900 hover:text-slate-900 dark:hover:text-slate-200' : ''
         ]">
        <span *ngIf="rla.isActive" class="absolute left-0 top-1/2 -translate-y-1/2 w-0.5 h-5 bg-blue-600 rounded-r-full"></span>
        <span [ngClass]="rla.isActive ? 'text-blue-600 dark:text-blue-400' : 'text-slate-400 group-hover:text-slate-600 dark:group-hover:text-slate-300'">
          <lucide-icon [name]="item.icon" [size]="18"></lucide-icon>
        </span>
        <span *ngIf="!isSidebarCollapsed">{{ item.label }}</span>
      </a>

      <div class="my-2 h-px bg-slate-100 dark:bg-slate-800"></div>

      <a routerLink="/profile" 
         routerLinkActive="bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400" 
         #rlaProfile="routerLinkActive"
         [title]="isSidebarCollapsed ? 'Profile' : ''"
         class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition-all duration-150 group w-full"
         [ngClass]="[
           isSidebarCollapsed ? 'justify-center px-0' : '',
           !rlaProfile.isActive ? 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-900 hover:text-slate-900 dark:hover:text-slate-200' : ''
         ]">
        <span [ngClass]="rlaProfile.isActive ? 'text-blue-600' : 'text-slate-400 group-hover:text-slate-600 dark:group-hover:text-slate-300'">
          <lucide-icon name="user" [size]="18"></lucide-icon>
        </span>
        <span *ngIf="!isSidebarCollapsed">Profil</span>
      </a>

      <a routerLink="/settings" 
         routerLinkActive="bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400" 
         #rlaSettings="routerLinkActive"
         [title]="isSidebarCollapsed ? 'Settings' : ''"
         class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition-all duration-150 group w-full"
         [ngClass]="[
           isSidebarCollapsed ? 'justify-center px-0' : '',
           !rlaSettings.isActive ? 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-900 hover:text-slate-900 dark:hover:text-slate-200' : ''
         ]">
        <span [ngClass]="rlaSettings.isActive ? 'text-blue-600' : 'text-slate-400 group-hover:text-slate-600 dark:group-hover:text-slate-300'">
          <lucide-icon name="settings" [size]="18"></lucide-icon>
        </span>
        <span *ngIf="!isSidebarCollapsed">Ayarlar</span>
      </a>
    </nav>

    <!-- Footer -->
    <div class="p-2 border-t border-slate-100 dark:border-slate-800 flex flex-col gap-1">
      <button (click)="toggleTheme()"
        class="flex items-center gap-3 rounded-xl px-3 py-2 text-sm text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors"
        [ngClass]="isSidebarCollapsed ? 'justify-center px-0' : ''">
        <lucide-icon *ngIf="isDarkTheme" name="sun" [size]="16" class="text-amber-500"></lucide-icon>
        <lucide-icon *ngIf="!isDarkTheme" name="moon" [size]="16"></lucide-icon>
        <span *ngIf="!isSidebarCollapsed">{{ isDarkTheme ? 'Açık tema' : 'Koyu tema' }}</span>
      </button>

      <button (click)="toggleSidebar()"
        class="flex items-center gap-3 rounded-xl px-3 py-2 text-sm text-slate-500 dark:text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors"
        [ngClass]="isSidebarCollapsed ? 'justify-center px-0' : ''">
        <lucide-icon name="panel-left" [size]="16"></lucide-icon>
        <span *ngIf="!isSidebarCollapsed">Daralt</span>
      </button>

      <ng-container *ngIf="currentUser$ | async as user">
        <div *ngIf="!isSidebarCollapsed" class="flex flex-col gap-2 p-2 mt-1">
          <!-- User Info -->
          <div class="flex items-center gap-2.5 px-2 py-1.5 cursor-pointer">
            <div class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-xs font-bold text-slate-600 dark:text-slate-300 transition-colors">
              {{ user.firstName[0] }}{{ user.lastName[0] }}
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-slate-900 dark:text-slate-100 truncate transition-colors">{{ user.firstName }} {{ user.lastName }}</p>
              <p class="text-xs text-slate-400 dark:text-slate-500 truncate transition-colors">{{ user.email }}</p>
            </div>
          </div>
          <!-- Logout Button -->
          <button (click)="logout()" class="flex items-center justify-center gap-2 w-full py-2 px-3 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-400 bg-slate-100/50 dark:bg-slate-800/50 hover:bg-red-50 hover:text-red-600 dark:hover:bg-red-900/30 dark:hover:text-red-400 transition-all duration-300 border border-transparent hover:border-red-100 dark:hover:border-red-900/30 group">
            <lucide-icon name="log-out" [size]="15" class="group-hover:translate-x-0.5 transition-transform"></lucide-icon>
            Çıkış Yap
          </button>
        </div>
        <div *ngIf="isSidebarCollapsed" class="flex justify-center p-2 mt-1">
          <!-- Collapsed Logout Button -->
          <button (click)="logout()" class="p-2 rounded-xl text-slate-600 dark:text-slate-400 bg-slate-100/50 dark:bg-slate-800/50 hover:bg-red-50 hover:text-red-600 dark:hover:bg-red-900/30 dark:hover:text-red-400 transition-all duration-300 shadow-sm border border-transparent hover:border-red-100 dark:hover:border-red-900/30 group" title="Çıkış Yap">
            <lucide-icon name="log-out" [size]="16" class="group-hover:translate-x-0.5 transition-transform"></lucide-icon>
          </button>
        </div>
      </ng-container>
    </div>
  </aside>

  <!-- Main Area -->
  <div class="flex flex-col flex-1 min-w-0 overflow-hidden">
    
    <!-- Top Bar -->
    <header class="h-16 bg-white dark:bg-slate-950 border-b border-slate-100 dark:border-slate-800 flex items-center px-5 gap-4 flex-shrink-0">
      <div class="flex items-center gap-1.5 text-sm text-slate-400 mr-2 hidden sm:flex">
        <lucide-icon name="home" [size]="13"></lucide-icon>
        <lucide-icon name="chevron-right" [size]="11"></lucide-icon>
        <span class="text-slate-700 dark:text-slate-300 font-medium">Dashboard</span>
      </div>

      <div class="relative flex-1 max-w-xs">
        <lucide-icon name="search" [size]="14" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></lucide-icon>
        <input type="text" placeholder="Görev, kategori ara…"
          class="w-full pl-9 pr-4 py-2 text-sm bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-slate-100 placeholder-slate-400 transition-all duration-300"/>
      </div>

      <div class="flex items-center gap-1 ml-auto">
        <button class="inline-flex items-center justify-center gap-2 font-medium rounded-xl transition-all duration-150 focus:outline-none px-3 py-1.5 text-xs bg-blue-600 text-white hover:bg-blue-700 shadow-sm">
          <lucide-icon name="plus" [size]="13"></lucide-icon>
          Yeni görev
        </button>
        <button class="relative w-9 h-9 flex items-center justify-center rounded-xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
          <lucide-icon name="bell" [size]="18"></lucide-icon>
          <span *ngIf="unreadCount > 0" class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border border-white dark:border-slate-950"></span>
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
