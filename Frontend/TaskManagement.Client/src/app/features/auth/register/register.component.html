<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <div mat-card-avatar class="auth-header-image">
        <mat-icon>person_add</mat-icon>
      </div>
      <mat-card-title>Kayıt Ol</mat-card-title>
      <mat-card-subtitle>Task Management System</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Ad</mat-label>
            <input matInput formControlName="firstName">
            <mat-error *ngIf="registerForm.get('firstName')?.hasError('required')">Ad zorunludur</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Soyad</mat-label>
            <input matInput formControlName="lastName">
            <mat-error *ngIf="registerForm.get('lastName')?.hasError('required')">Soyad zorunludur</mat-error>
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline">
          <mat-label>Kullanıcı Adı</mat-label>
          <input matInput formControlName="username">
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="registerForm.get('username')?.hasError('required')">Kullanıcı adı zorunludur</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email Adresi</mat-label>
          <input matInput formControlName="email" type="email">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="registerForm.get('email')?.hasError('required')">Email zorunludur</mat-error>
          <mat-error *ngIf="registerForm.get('email')?.hasError('email')">Geçerli bir email giriniz</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Şifre</mat-label>
          <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'">
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="registerForm.get('password')?.hasError('required')">Şifre zorunludur</mat-error>
          <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Şifre en az 6 karakter olmalı</mat-error>
        </mat-form-field>
      </form>
    </mat-card-content>

    <mat-card-actions class="auth-actions">
      <button mat-flat-button color="primary" [disabled]="registerForm.invalid || isLoading" (click)="onSubmit()" class="full-width-btn">
        {{ isLoading ? 'Kayıt Olunuyor...' : 'Kayıt Ol' }}
      </button>
      <div class="auth-links">
        <span>Zaten hesabın var mı?</span>
        <a routerLink="/login" mat-button color="accent">Giriş Yap</a>
      </div>
    </mat-card-actions>
  </mat-card>
</div>
