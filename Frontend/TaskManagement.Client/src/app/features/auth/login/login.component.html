<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <div mat-card-avatar class="auth-header-image">
        <mat-icon>task_alt</mat-icon>
      </div>
      <mat-card-title>Giriş Yap</mat-card-title>
      <mat-card-subtitle>Task Management System</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        <mat-form-field appearance="outline">
          <mat-label>Email Adresi</mat-label>
          <input matInput formControlName="email" type="email" placeholder="ornek@mail.com">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email zorunludur</mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Geçerli bir email giriniz</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Şifre</mat-label>
          <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'">
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button"
                  [attr.aria-label]="'Şifreyi gizle'" [attr.aria-pressed]="hidePassword">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Şifre zorunludur</mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">Şifre en az 6 karakter olmalı</mat-error>
        </mat-form-field>
      </form>
    </mat-card-content>

    <mat-card-actions class="auth-actions">
      <button mat-flat-button color="primary" [disabled]="loginForm.invalid || isLoading" (click)="onSubmit()" class="full-width-btn">
        {{ isLoading ? 'Giriş Yapılıyor...' : 'Giriş Yap' }}
      </button>
      <div class="auth-links">
        <span>Hesabın yok mu?</span>
        <a routerLink="/register" mat-button color="accent">Kayıt Ol</a>
      </div>
    </mat-card-actions>
  </mat-card>
</div>
