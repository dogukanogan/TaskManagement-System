<div class="min-h-screen flex transition-colors duration-300">
  <!-- Left: form -->
  <div class="flex-1 flex flex-col justify-center px-8 sm:px-16 lg:px-20 py-12 bg-white dark:bg-slate-950 transition-colors duration-300">
    <div class="max-w-sm w-full mx-auto">
      <div class="flex items-center gap-2.5 mb-10">
        <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200 dark:shadow-blue-900/20">
          <lucide-icon name="check-square" [size]="18" class="text-white"></lucide-icon>
        </div>
        <span class="text-xl font-bold text-slate-900 dark:text-slate-100 tracking-tight transition-colors">TaskFlow</span>
      </div>
      <h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-1 transition-colors">Tekrar hoş geldiniz</h2>
      <p class="text-slate-500 dark:text-slate-400 text-sm mb-8 transition-colors">Çalışma alanınıza devam etmek için giriş yapın</p>

      <div *ngIf="errorMessage" class="flex items-center gap-2 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-400 text-sm px-3.5 py-2.5 rounded-xl mb-4 transition-colors">
        <lucide-icon name="alert-circle" [size]="14"></lucide-icon>
        {{ errorMessage }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
        
        <!-- Email Field -->
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-slate-700 dark:text-slate-300 transition-colors">E-posta adresi</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
              <lucide-icon name="mail" [size]="15"></lucide-icon>
            </span>
            <input type="email" formControlName="email" placeholder="dogukan@example.com" 
              class="w-full rounded-xl border bg-white dark:bg-slate-800/50 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-300 text-sm pl-10 pr-3.5 py-2.5 border-slate-200 dark:border-slate-700"
              [class.border-red-400]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" />
          </div>
          <p *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-xs text-red-500 dark:text-red-400">Geçerli bir e-posta adresi girmelisiniz</p>
        </div>

        <!-- Password Field -->
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-slate-700 dark:text-slate-300 transition-colors">Şifre</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
              <lucide-icon name="lock" [size]="15"></lucide-icon>
            </span>
            <input [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="••••••••" 
              class="w-full rounded-xl border bg-white dark:bg-slate-800/50 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-300 text-sm pl-10 pr-10 py-2.5 border-slate-200 dark:border-slate-700"
              [class.border-red-400]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" />
            <button type="button" (click)="hidePassword = !hidePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors focus:outline-none">
              <lucide-icon [name]="hidePassword ? 'eye-off' : 'eye'" [size]="15"></lucide-icon>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <div (click)="rememberMe = !rememberMe"
              class="w-4 h-4 rounded border-2 flex items-center justify-center transition-colors duration-300 cursor-pointer flex-shrink-0"
              [ngClass]="rememberMe ? 'bg-blue-600 border-blue-600' : 'border-slate-300 dark:border-slate-600'">
              <lucide-icon *ngIf="rememberMe" name="check" [size]="10" class="text-white"></lucide-icon>
            </div>
            <span class="text-sm text-slate-600 dark:text-slate-400 transition-colors">Beni hatırla</span>
          </label>
          <button type="button" class="text-sm text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 font-medium transition-colors">Şifremi unuttum?</button>
        </div>

        <button type="submit" [disabled]="isLoading || loginForm.invalid" 
          class="inline-flex w-full items-center justify-center gap-2 font-medium rounded-xl transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-offset-1 dark:focus:ring-offset-slate-950 disabled:opacity-50 disabled:cursor-not-allowed px-6 py-3 text-sm bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-500 shadow-sm shadow-blue-200/50 dark:shadow-blue-900/20">
          <ng-container *ngIf="isLoading">
            <lucide-icon name="refresh-cw" [size]="15" class="animate-spin"></lucide-icon>
            Giriş yapılıyor...
          </ng-container>
          <ng-container *ngIf="!isLoading">
            Giriş Yap
            <lucide-icon name="arrow-right" [size]="15"></lucide-icon>
          </ng-container>
        </button>



        <p class="text-sm text-slate-500 dark:text-slate-400 text-center mt-6 transition-colors">
          Hesabınız yok mu? 
          <a routerLink="/register" class="text-blue-600 dark:text-blue-400 font-semibold hover:text-blue-700 dark:hover:text-blue-300 ml-1 transition-colors">Kayıt ol</a>
        </p>
      </form>
    </div>
  </div>

  <!-- Right: decorative background -->
  <div class="hidden lg:flex flex-1 relative bg-slate-50 dark:bg-slate-900 transition-colors duration-300 overflow-hidden">
    <div class="absolute inset-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px] dark:bg-[linear-gradient(to_right,#ffffff0a_1px,transparent_1px),linear-gradient(to_bottom,#ffffff0a_1px,transparent_1px)]"></div>
    <div class="absolute left-0 right-0 top-0 -z-10 m-auto h-[310px] w-[310px] rounded-full bg-blue-600 opacity-[0.15] blur-[100px] transition-opacity"></div>
    
    <div class="relative w-full flex flex-col items-center justify-center p-12">
      <div class="bg-white/60 dark:bg-slate-950/60 backdrop-blur-xl border border-white/20 dark:border-white/5 shadow-2xl rounded-3xl p-8 max-w-lg w-full transition-colors duration-300">
        <div class="flex items-center gap-3 mb-6">
          <div class="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center transition-colors">
            <span class="text-blue-600 dark:text-blue-400 font-bold">DO</span>
          </div>
          <div>
            <h4 class="font-semibold text-slate-900 dark:text-slate-100 transition-colors">Doğukan Ogan</h4>
            <p class="text-xs text-slate-500 dark:text-slate-400 transition-colors">Proje Yöneticisi</p>
          </div>
        </div>
        <div class="space-y-4">
          <div class="h-2 bg-slate-200 dark:bg-slate-700 rounded w-3/4 transition-colors"></div>
          <div class="h-2 bg-slate-200 dark:bg-slate-700 rounded w-1/2 transition-colors"></div>
          <div class="h-2 bg-slate-200 dark:bg-slate-700 rounded w-5/6 transition-colors"></div>
        </div>
        <div class="mt-8 flex gap-2">
          <div class="px-3 py-1 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-full text-xs font-medium transition-colors">Üretkenlik</div>
          <div class="px-3 py-1 bg-purple-50 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 rounded-full text-xs font-medium transition-colors">İşbirliği</div>
        </div>
      </div>
    </div>
  </div>
</div>
