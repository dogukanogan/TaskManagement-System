<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">{{ data.cancelText || 'İptal' }}</button>
  <button mat-flat-button class="confirm-btn" (click)="onConfirm()">{{ data.confirmText || 'Sil' }}</button>
</mat-dialog-actions>
